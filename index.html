<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Square Space - Coming Soon</title>
    <!-- Bootstrap CSS -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Social Media Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            overflow: hidden;
        }
        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            text-align: center;
            animation: fadeIn 3s ease-in-out;
            width: 80%;
            max-width: 600px;
        }
        .logo {
            max-width: 50%;
            margin-bottom: 20px;
            animation: zoomIn 2s ease-in-out;
        }
        .spinner-border {
            width: 3rem;
            height: 3rem;
            margin-top: 20px;
        }
        .text-content {
            margin-top: 20px;
            animation: fadeIn 4s ease-in-out;
        }
        .slideshow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            perspective: 1px;
        }
        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s;
            background-size: cover;
            background-position: center;
            transform: translateZ(-1px) scale(2);
        }
        .slide.active {
            opacity: 1;
            transform: translateZ(0) scale(1);
        }
        .slide video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes zoomIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        .social-icons {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            animation: slideIn 2s ease-in-out;
        }
        .social-icons a {
            color: white;
            margin: 5px;
            font-size: 2rem;
            transition: transform 0.3s, color 0.3s;
        }
        .social-icons a:hover {
            transform: scale(1.2);
            color: #f0ad4e;
        }
        .scroll-down {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.5rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
            60% {
                transform: translateY(-5px);
            }
        }
        @keyframes slideIn {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .contact {
            display: none;
            background: rgba(0, 0, 0, 0.7);
            padding: 50px 15px;
            text-align: center;
            position: fixed;
            bottom: 0;
            width: 100%;
            z-index: 3;
        }
        .contact.show {
            display: block;
        }
        .contact h2 {
            margin-bottom: 20px;
            color: #f0ad4e;
        }
        .contact input, .contact textarea {
            margin-bottom: 15px;
            padding: 15px;
            border: none;
            border-radius: 5px;
            width: 100%;
            max-width: 500px;
        }
        .contact button {
            padding: 15px 30px;
            background: #f0ad4e;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        .contact button:hover {
            background: #ec971f;
        }
        .footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.7);
            text-align: center;
            padding: 10px;
            color: white;
        }
        @media (max-width: 768px) {
            .content {
                width: 90%;
            }
            .contact {
                padding: 30px 10px;
            }
            .contact h2 {
                font-size: 1.5rem;
            }
            .contact input, .contact textarea {
                font-size: 0.9rem;
            }
            .contact button {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="slideshow-container">
        <!-- Slide 1 -->
        <div class="slide active" style="background-image: url('image3.jpg');"></div>
        <!-- Slide 2 -->
        <div class="slide" style="background-image: url('image4.jpg');"></div>
        <!-- Slide 3 -->
        <div class="slide" style="background-image: url('image5.jpg');"></div>
        <!-- Slide 4 (Video 1) -->
        <div class="slide">
            <video autoplay muted loop>
                <source src="video1.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
        <!-- Slide 5 (Video 2) -->
        <div class="slide">
            <video autoplay muted loop>
                <source src="video3.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div>

    <div class="content">
        <!-- Add your logo here -->
        <img src="minimalist.png" alt="Square Space Logo" class="logo">
        <h1 class="display-4">Our Website is Coming Soon</h1>
        <p>We are working hard to give you a great experience.</p>
        <div class="spinner-border text-light" role="status">
            <span class="sr-only">Loading...</span>
        </div>
        <p class="text-content">Stay tuned!</p>

        <div class="social-icons">
            <a href="https://www.instagram.com/_square_space__/" target="_blank"><i class="fab fa-instagram"></i></a>
            <a href="https://www.linkedin.com/company/square-space-1/about/?viewAsMember=true" target="_blank"><i class="fab fa-linkedin"></i></a>
        </div>

        <button id="contact-btn" class="btn btn-primary">Contact Us</button>
    </div>

    <div class="contact" id="contact-form">
        <h2>Contact Us</h2>
        <form action="mailto:ansarinavish571@gmail.com" method="post" enctype="text/plain">
            <input type="text" name="name" placeholder="Your Name" required>
            <input type="email" name="email" placeholder="Your Email" required>
            <textarea name="message" rows="4" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <div class="scroll-down">
        <i class="fas fa-chevron-down"></i>
    </div>

    <div class="footer">
        <p>&copy; 2024 Square Space. All rights reserved.</p>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.5.4/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>

    <!-- Custom JS -->
    <script>
        let slideIndex = 0;
        showSlides();

        function showSlides() {
            let slides = document.getElementsByClassName("slide");
            for (let i = 0; i < slides.length; i++) {
                slides[i].classList.remove("active");
            }
            slideIndex++;
            if (slideIndex > slides.length) {
                slideIndex = 1;
            }
            slides[slideIndex - 1].classList.add("active");
            setTimeout(showSlides, 2000); // Change slide every 5 seconds
        }

        document.getElementById("contact-btn").addEventListener("click", function () {
            document.getElementById("contact-form").classList.toggle("show");
        });
    </script>
</body>
</html>
